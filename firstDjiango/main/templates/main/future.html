{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Передбачення</title>
    <link rel="stylesheet" href="{% static 'main/css/future.css' %}">
</head>
<body>
    <p id="prediction" class="prediction"></p>
    <script>
        const predictions = [
            "Сьогодні вдалий день, щоб почати те, що ви давно відкладали.",
            "Найближчим часом ви отримаєте приємну новину.",
            "Ваша наполегливість приведе до сильного результату.",
            "Скоро з'явиться можливість, яку не варто ігнорувати.",
            "Спокійний крок сьогодні дасть великий прогрес завтра."
        ];

        const randomIndex = Math.floor(Math.random() * predictions.length);
        document.getElementById("prediction").textContent = predictions[randomIndex];
    </script>
</body>
</html>
