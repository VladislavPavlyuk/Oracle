{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} {% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        data-persistent-style="true"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{% static 'main/css/base.css' %}" data-persistent-style="true">
    {% block extra_css %} {% endblock %}
</head>
<body>
    <nav class="site-navbar">
        <img class="site-nav-logo" src="{% static 'main/img/logo.png' %}" alt="Логотип">
        <div class="site-nav-links">
            <a class="site-nav-link" href="{% url 'index' %}">Home</a>
            <a class="site-nav-link" href="{% url 'team:team' %}">Team</a>
            <a class="site-nav-link" href="{% url 'blog_list' %}">Blog</a>
            <a class="site-nav-link" href="{% url 'about' %}">About us</a>
            <a class="site-nav-link" href="#">Contacts</a>
        </div>
    </nav>
    <main class="main-container">
        <div class="content-box">
            {% block content %}
            {% endblock content %}
        </div>
    </main>
</body>
</html>
