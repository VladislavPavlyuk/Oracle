{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} {% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{% static 'main/css/base.css' %}">
    {% block extra_css %} {% endblock %}
</head>
<body data-barba="wrapper">
    <nav class="site-navbar">
        <img class="site-nav-logo" src="{% static 'main/img/logo.png' %}" alt="Логотип">
        <div class="site-nav-links">
            <a class="site-nav-link" href="{% url 'index' %}">Home</a>
            <a class="site-nav-link" href="{% url 'team' %}">Team</a>
            <a class="site-nav-link" href="{% url 'blog_list' %}">Blog</a>
            <a class="site-nav-link" href="{% url 'about' %}">About us</a>
            <a class="site-nav-link" href="#">Contacts</a>
        </div>
    </nav>
    <main class="main-container">
        <div class="content-box" data-barba="container" data-barba-namespace="{% block namespace %}default{% endblock %}">
            {% block content %}
            {% endblock content %}
        </div>
    </main>
    <div id="prediction-transition-hud" class="prediction-transition-hud" aria-hidden="true"></div>
    <script src="https://cdn.jsdelivr.net/npm/@barba/core"></script>
    <script src="{% static 'main/js/barba-prediction.js' %}"></script>
</body>
</html>
