{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} {% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        data-persistent-style="true"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{% static 'main/css/base.css' %}?v=20260302-02" data-persistent-style="true">
    {% block extra_css %} {% endblock %}
    <style>
        .swal2-popup.swal-error-toast .swal2-title,
        .swal2-popup.swal-error-toast .swal2-html-container {
            color: #991b1b !important;
        }
    </style>
</head>
<body>
    <nav class="site-navbar">
        <img class="site-nav-logo" src="{% static 'main/img/logo.png' %}" alt="Логотип">
        <div class="site-nav-links">
            <a class="site-nav-link" href="{% url 'index' %}">Home</a>
            <a class="site-nav-link" href="{% url 'team:team' %}">Team</a>
            <a class="site-nav-link" href="{% url 'blog_list' %}">Blog</a>
            <a class="site-nav-link" href="{% url 'about' %}">About us</a>
            <a class="site-nav-link" href="#">Contacts</a>
        </div>
        <div class="site-nav-auth">
            {% if user.is_authenticated %}
                <span class="site-nav-username">{{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}" class="site-nav-auth-form">
                    {% csrf_token %}
                    <button type="submit" class="site-nav-auth-btn">Logout</button>
                </form>
            {% else %}
                <a class="site-nav-auth-link" href="{% url 'login' %}">Login</a>
                <a class="site-nav-auth-link" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </nav>
    <main class="main-container">
        <div class="content-box">
            {% block content %}
            {% endblock content %}
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% if messages %}
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const alerts = [
                    {% for message in messages %}
                        {
                            icon: "{% if 'success' in message.tags %}success{% elif 'error' in message.tags %}error{% elif 'warning' in message.tags %}warning{% else %}info{% endif %}",
                            title: "{{ message|escapejs }}",
                            toast: true,
                            position: "top-end",
                            showConfirmButton: false,
                            timer: 3500,
                            timerProgressBar: true,
                            {% if 'error' in message.tags %}
                                background: "#fee2e2",
                                color: "#991b1b",
                                iconColor: "#dc2626",
                                customClass: {
                                    popup: "swal-error-toast"
                                }
                            {% endif %}
                        }{% if not forloop.last %},{% endif %}
                    {% endfor %}
                ];

                alerts.forEach((alertConfig) => Swal.fire(alertConfig));
            });
        </script>
    {% endif %}
</body>
</html>
