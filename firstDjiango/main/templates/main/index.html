<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оракул</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7ff;
            color: #1a2942;
            text-align: center;
            padding: 1.5rem;
        }

        h1 {
            margin-bottom: 1rem;
            font-size: clamp(1.4rem, 3.5vw, 2.2rem);
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: #0d8a6a;
            color: #ffffff;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-weight: 600;
        }

<body>
    <main>
        <h1>Ваш Оракул</h1>
        <a class="btn" href="/future/">Отримати передбачення</a>

</html>
