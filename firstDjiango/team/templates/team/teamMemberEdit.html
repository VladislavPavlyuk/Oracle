{% extends 'main/base.html' %}
{% load static %}

{% block title %}Edit Team Member{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'team/css/team.css' %}">
{% endblock %}

{% block content %}
    <section class="team-page">
        <h1 class="team-title">Edit Team Member</h1>
        <p class="team-subtitle">Update profile details and compensation data.</p>

        <div class="team-card">
            <form method="post" class="team-form" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="team-form-actions">
                    <button type="submit" class="team-btn team-btn-primary">Save</button>
                    <a href="{% url 'team:team' %}" class="team-btn team-btn-info">Cancel</a>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
